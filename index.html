<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Age calculator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,700;1,400;1,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="calculator-container">
    <div class="date">
     <div class="day-input">
        <p class="field-label">Day</p>
        <input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="DD">
        <p class="error-message day-error"></p>
      </div>
      
      <div class="month-input">
        <p class="field-label">MONTH</p>
        <input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="MM">
        <p class="error-message month-error"></p>
      </div>
      
      <div class="year-input">
        <p class="field-label">Year</p>
        <input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="YYYY">
        <p class="error-message year-error"></p>
      </div>
    </div>
    <div class="arrow">
      <div class="line"></div>
      <button class="calculate-btn">
        <img src="./assets/images/icon-arrow.svg" alt="arrow">
      </button>
    </div>
    <div class="age-calculator js-age-calculator">
      <div class="age">
         <div class="js-years"><span>- -</span> years</div> 
      </div>
      <div class="age">
        <div class="js-months"><span>- -</span> months</div> 
      </div>
      <div class="age">
        <div class="js-days"><span>- -</span> days</div> 
      </div>
    </div>
  </main>
  <script src="script.js"></script>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/ruqiash12-oss">Ruqia Al Sheikha</a>.
  </footer>
</body>
</html>
